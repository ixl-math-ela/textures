<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Diagnostic Tool</title>
    <style>
        body { background: #0a0a0a; color: #ddd; font-family: 'Courier New', Courier, monospace; margin: 20px; }
        #console { 
            background: #000; 
            border: 1px solid #333; 
            height: 350px; 
            overflow-y: auto; 
            padding: 15px; 
            margin-bottom: 30px; 
            font-size: 13px;
            line-height: 1.4;
            box-shadow: inset 0 0 10px #000;
        }
        .error { color: #ff5555; font-weight: bold; }
        .success { color: #55ff55; }
        .info { color: #55ccff; }
        .warning { color: #ffff55; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .card { border: 1px solid #222; padding: 15px; background: #111; text-align: center; border-radius: 4px; }
        img { 
            max-width: 100%; 
            height: 120px; 
            object-fit: cover; 
            border: 1px solid #333; 
            margin-top: 10px; 
            background: #050505;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        button { 
            background: #4ade80; 
            border: none; 
            padding: 12px 24px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-bottom: 20px; 
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover { background: #22c55e; }
        h1 { font-size: 20px; color: #4ade80; margin-bottom: 5px; }
        p { font-size: 12px; color: #777; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h1>SYSTEM DIAGNOSTICS: 8K PBR BUFFER</h1>
    <p>Testing connectivity and CORS headers for GitHub Release assets.</p>
    
    <button onclick="runTests()">START CONNECTIVITY TEST</button>

    <div id="console">--- SYSTEM IDLE: STANDING BY ---<br></div>

    <h3>IMAGE PREVIEWS (BROWSERS ONLY)</h3>
    <div class="grid" id="preview-grid"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const BASE = 'https://github.com/ixl-math-ela/textures/releases/download/v1.0.0.0/';
        const FILES = [
            { id: 'color', name: 'Grass (Color)', url: BASE + 'Grass.jpg' },
            { id: 'ao', name: 'GrassA (Ambient Occlusion)', url: BASE + 'GrassA.jpg' },
            { id: 'displacement', name: 'GrassD (Displacement)', url: BASE + 'GrassD.jpg' },
            { id: 'ndx', name: 'GrassNDX (Normal DX)', url: BASE + 'GrassNDX.jpg' },
            { id: 'ngl', name: 'GrassNGL (Normal GL)', url: BASE + 'GrassNGL.jpg' },
            { id: 'rough', name: 'GrassR (Roughness)', url: BASE + 'GrassR.jpg' },
            { id: 'sky', name: 'Sky HDRI (Local)', url: 'DaySkyHDRI063B_1K_TONEMAPPED.jpg' }
        ];

        const logDiv = document.getElementById('console');

        function log(msg, type = '') {
            const entry = document.createElement('div');
            entry.className = type;
            const time = new Date().toLocaleTimeString().split(' ')[0];
            entry.innerHTML = `[${time}] ${msg}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function testCORS(file) {
            try {
                const response = await fetch(file.url, { mode: 'cors' });
                if (response.ok) {
                    log(`CORS SUCCESS: ${file.name} is accessible by scripts.`, 'success');
                    return true;
                } else {
                    log(`HTTP ERROR: ${file.name} returned status ${response.status}`, 'error');
                    return false;
                }
            } catch (err) {
                log(`CORS BLOCKED: ${file.name} cannot be read by 3D Engine. GitHub Releases do not allow script access.`, 'error');
                return false;
            }
        }

        function testThreeJS(file) {
            const loader = new THREE.TextureLoader();
            loader.setCrossOrigin('anonymous');
            loader.load(
                file.url,
                () => log(`ENGINE SUCCESS: Three.js fully loaded ${file.name}`, 'success'),
                undefined,
                () => log(`ENGINE FAILURE: Three.js could not process ${file.name}.`, 'error')
            );
        }

        function runTests() {
            logDiv.innerHTML = '--- INITIALIZING TEST SEQUENCE ---<br>';
            const grid = document.getElementById('preview-grid');
            grid.innerHTML = '';

            FILES.forEach(async (file) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<span style="font-size:11px; color:#4ade80">${file.name}</span>`;
                
                const img = new Image();
                img.onload = () => log(`URL VALID: ${file.name} exists and is viewable.`, 'info');
                img.onerror = () => log(`404 NOT FOUND: ${file.name} could not be reached.`, 'error');
                img.src = file.url;
                
                card.appendChild(img);
                grid.appendChild(card);

                const isCorsOk = await testCORS(file);
                if (isCorsOk) {
                    testThreeJS(file);
                } else {
                    log(`SKIPPING ENGINE TEST for ${file.name} due to CORS block.`, 'warning');
                }
            });
        }
    </script>
</body>
</html>
