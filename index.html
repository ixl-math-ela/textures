<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite PBR Grass Flight</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 12px;
            pointer-events: none;
            border: 1px solid #555;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .coords { font-family: 'Courier New', Courier, monospace; color: #4ade80; margin-top: 8px; font-size: 14px; font-weight: bold; }
        .controls { font-size: 12px; margin-top: 12px; color: #ccc; line-height: 1.6; border-top: 1px solid #444; padding-top: 10px; }
        .status { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="status">System Online</div>
        <strong>Infinite PBR Terrain</strong>
        <div id="coords" class="coords">X: 0, Y: 0, Z: 0</div>
        <div class="controls">
            <strong>WASD</strong>: Fly Forward/Back/Strafe<br>
            <strong>Q / E</strong>: Ascend / Descend Vertical<br>
            <strong>Mouse</strong>: Look | <strong>Click</strong>: Engage Controls
        </div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // Assets Mapping - All files in same hierarchy
        const ASSETS = {
            sky: 'DaySkyHDRI063B_1K_TONEMAPPED.jpg',
            color: 'Grass005_1K-PNG_Color.png',
            normal: 'Grass005_1K-PNG_NormalGL.png',
            roughness: 'Grass005_1K-PNG_Roughness.png',
            ao: 'Grass005_1K-PNG_AmbientOcclusion.png',
            displacement: 'Grass005_1K-PNG_Displacement.png'
        };

        // Tuning Constants
        const CHUNK_SIZE = 80;
        const SEGMENTS = 128; // Increased for high-fidelity displacement
        const RENDER_DISTANCE = 2; 
        const TILING = 8; // Tighter tiling makes grass feel more detailed

        let scene, camera, renderer, clock, loader;
        let chunks = new Map();
        let keys = { w: false, a: false, s: false, d: false, q: false, e: false };
        let textures = {};

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2500);
            camera.position.set(0, 15, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            // LIGHTING FIX: Control exposure to prevent white-out
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.6; // Lowered exposure for HDRI
            
            document.body.appendChild(renderer.domElement);

            loader = new THREE.TextureLoader();

            // Skybox Setup
            loader.load(ASSETS.sky, (tex) => {
                tex.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = tex;
                scene.environment = tex;
            });

            loadPBRTextures();

            // Secondary Lighting for depth
            const ambient = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.0);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            clock = new THREE.Clock();

            setupControls();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function loadPBRTextures() {
            const maps = ['color', 'normal', 'roughness', 'ao', 'displacement'];
            maps.forEach(mapType => {
                const t = loader.load(ASSETS[mapType === 'displacement' ? 'displacement' : mapType]);
                t.wrapS = t.wrapT = THREE.RepeatWrapping;
                t.repeat.set(TILING, TILING);
                textures[mapType] = t;
            });
        }

        // Procedural Base Terrain Shape
        function getBaseHeight(x, z) {
            // Large rolling hills
            return (Math.sin(x * 0.015) * Math.cos(z * 0.015) * 12) + 
                   (Math.sin(x * 0.04) * 3);
        }

        function createChunk(x, z) {
            // Using more segments to allow the displacement map to actually push vertices
            const geometry = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, SEGMENTS, SEGMENTS);
            geometry.rotateX(-Math.PI / 2);

            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let px = pos.getX(i) + x * CHUNK_SIZE;
                let pz = pos.getZ(i) + z * CHUNK_SIZE;
                pos.setY(i, getBaseHeight(px, pz));
            }
            
            // Required for AO mapping
            geometry.setAttribute('uv2', new THREE.BufferAttribute(geometry.attributes.uv.array, 2));
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({
                map: textures.color,
                normalMap: textures.normal,
                roughnessMap: textures.roughness,
                aoMap: textures.ao,
                displacementMap: textures.displacement,
                
                // DISPLACEMENT PUMP: Stronger values for "real" grass feel
                displacementScale: 4.5, 
                displacementBias: -1.2,
                
                normalScale: new THREE.Vector2(2.5, 2.5), // Boost normals for shadow contrast
                aoMapIntensity: 1.5,
                roughness: 1.0
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x * CHUNK_SIZE, 0, z * CHUNK_SIZE);
            return mesh;
        }

        function updateChunks() {
            const curX = Math.round(camera.position.x / CHUNK_SIZE);
            const curZ = Math.round(camera.position.z / CHUNK_SIZE);

            document.getElementById('coords').innerText = 
                `X: ${Math.floor(camera.position.x)} | Y: ${Math.floor(camera.position.y)} | Z: ${Math.floor(camera.position.z)}`;

            const visible = new Set();
            for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
                for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
                    const cx = curX + x;
                    const cz = curZ + z;
                    const key = `${cx},${cz}`;
                    visible.add(key);

                    if (!chunks.has(key)) {
                        const chunk = createChunk(cx, cz);
                        scene.add(chunk);
                        chunks.set(key, chunk);
                    }
                }
            }

            chunks.forEach((chunk, key) => {
                if (!visible.has(key)) {
                    scene.remove(chunk);
                    chunk.geometry.dispose();
                    chunk.material.dispose();
                    chunks.delete(key);
                }
            });
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
            document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

            let pitch = 0, yaw = 0;
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
                    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
                }
            });

            document.addEventListener('click', () => document.body.requestPointerLock());
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const flySpeed = 65.0;

            // Vector-based Flight Movement
            const moveDir = new THREE.Vector3();
            if (keys.w) moveDir.z -= 1;
            if (keys.s) moveDir.z += 1;
            if (keys.a) moveDir.x -= 1;
            if (keys.d) moveDir.x += 1;
            
            moveDir.normalize();

            // Directional flying (Relative to camera)
            camera.translateZ(moveDir.z * flySpeed * delta);
            camera.translateX(moveDir.x * flySpeed * delta);

            // Vertical Override (Ascend/Descend)
            if (keys.q) camera.position.y += flySpeed * delta;
            if (keys.e) camera.position.y -= flySpeed * delta;

            updateChunks();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
