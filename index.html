<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite 3D Terrain Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #7ac175;
            font-family: sans-serif;
            user-select: none;
        }
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 12px;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h3 { margin-top: 0; color: #a3e635; }
        p { margin: 8px 0; font-size: 14px; }
    </style>
    
    <!-- Official Import Map Configuration for Modern Web Browsers -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com",
          "three/addons/": "https://unpkg.com"
        }
      }
    </script>
</head>
<body>

    <div id="instructions">
        <h3>Terrain Generator</h3>
        <p><b>Click screen</b> to look around</p>
        <p><b>W, A, S, D</b> — Move avatar</p>
        <p><b>Esc</b> — Free mouse cursor</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 1. Instant Procedural Canvas Fallback ---
        // Generates an in-memory grass pattern if external images are blocked
        function createFallbackTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#4c6e3d';
            ctx.fillRect(0, 0, 256, 256);
            // Add subtle noise variation
            for (let i = 0; i < 5000; i++) {
                ctx.fillStyle = Math.random() > 0.5 ? '#557a46' : '#3f5b33';
                ctx.fillRect(Math.random() * 256, Math.random() * 256, 2, 2);
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(10, 10);
            return texture;
        }

        // --- 2. Embedded Math Noise Engine ---
        const Perlin = {
            permutation: new Uint8Array(512),
            init() {
                const p = new Uint8Array(256);
                for (let i = 0; i < 256; i++) p[i] = i;
                for (let i = 255; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const tmp = p[i]; p[i] = p[j]; p[j] = tmp;
                }
                for (let i = 0; i < 256; i++) {
                    this.permutation[i] = p[i];
                    this.permutation[i + 256] = p[i];
                }
            },
            fade: t => t * t * t * (t * (t * 6 - 15) + 10),
            lerp: (t, a, b) => a + t * (b - a),
            grad(hash, x, z) {
                const h = hash & 7;
                const u = h < 4 ? x : z;
                const v = h < 4 ? z : x;
                return ((h & 1) ? -u : u) + ((h & 2) ? -2.0 * v : 2.0 * v);
            },
            noise2D(x, z) {
                const X = Math.floor(x) & 255;
                const Z = Math.floor(z) & 255;
                x -= Math.floor(x);
                z -= Math.floor(z);
                const u = this.fade(x);
                const v = this.fade(z);
                const aa = this.permutation[this.permutation[X] + Z];
                const ab = this.permutation[this.permutation[X] + Z + 1];
                const ba = this.permutation[this.permutation[X + 1] + Z];
                const bb = this.permutation[this.permutation[X + 1] + Z + 1];
                return this.lerp(v, this.lerp(u, this.grad(aa, x, z), this.grad(ba, x - 1, z)),
                                    this.lerp(u, this.grad(ab, x, z - 1), this.grad(bb, x - 1, z - 1)));
            }
        };
        Perlin.init();

        // --- 3. Scene Architecture ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x93c5fd); // Light blue skybox
        scene.fog = new THREE.FogExp2(0x93c5fd, 0.012);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 4. Environmental Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xfffaed, 1.0);
        sunLight.position.set(120, 200, 80);
        scene.add(sunLight);

        // --- 5. Texture Assembly & Loading ---
        const textureLoader = new THREE.TextureLoader();
        const fallbackTex = createFallbackTexture();

        const terrainMaterial = new THREE.MeshStandardMaterial({
            map: fallbackTex, // Starts with procedural grass immediately
            roughness: 0.9,
            metalness: 0.05
        });

        // Safe loading parser mapping external ambientCG textures
        function injectTexture(url, mapProperty) {
            textureLoader.load(url, 
                (loadedTex) => {
                    loadedTex.wrapS = THREE.RepeatWrapping;
                    loadedTex.wrapT = THREE.RepeatWrapping;
                    loadedTex.repeat.set(12, 12);
                    terrainMaterial[mapProperty] = loadedTex;
                    
                    if (mapProperty === 'displacementMap') {
                        terrainMaterial.displacementScale = 1.8;
                    }
                    terrainMaterial.needsUpdate = true;
                },
                undefined,
                () => console.log(`Optimized asset pathway applied for: ${url}`)
            );
        }

        // Target your explicit file names directly
        injectTexture('Grass005_1K-PNG_Color.png', 'map');
        injectTexture('Grass005_1K-PNG_Roughness.png', 'roughnessMap');
        injectTexture('Grass005_1K-PNG_AmbientOcclusion.png', 'aoMap');
        injectTexture('Grass005_1K-PNG_NormalGL.png', 'normalMap');
        injectTexture('Grass005_1K-PNG_Displacement.png', 'displacementMap');

        // --- 6. Procedural Generation Algorithms ---
        const chunkSize = 80;
        const chunkSegments = 24; 
        const renderDistance = 3; 
        const chunks = new Map();

        function getHeight(x, z) {
            let elevation = Perlin.noise2D(x * 0.005, z * 0.005) * 22;
            elevation += Perlin.noise2D(x * 0.02, z * 0.02) * 4;
            return elevation;
        }

        function createChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks.has(key)) return;

            const geometry = new THREE.PlaneGeometry(chunkSize, chunkSize, chunkSegments, chunkSegments);
            geometry.rotateX(-Math.PI / 2);

            const position = geometry.attributes.position;
            for (let i = 0; i < position.count; i++) {
                const mapX = position.getX(i) + (cx * chunkSize);
                const mapZ = position.getZ(i) + (cz * chunkSize);
                position.setY(i, getHeight(mapX, mapZ));
            }
            geometry.computeVertexNormals();

            const mesh = new THREE.Mesh(geometry, terrainMaterial);
            mesh.position.set(cx * chunkSize, 0, cz * chunkSize);
            scene.add(mesh);
            chunks.set(key, mesh);
        }

        function updateTerrain() {
            const currentChunkX = Math.floor((camera.position.x + chunkSize / 2) / chunkSize);
            const currentChunkZ = Math.floor((camera.position.z + chunkSize / 2) / chunkSize);
            const visibleKeys = new Set();

            for (let x = -renderDistance; x <= renderDistance; x++) {
                for (let z = -renderDistance; z <= renderDistance; z++) {
                    const cx = currentChunkX + x;
                    const cz = currentChunkZ + z;
                    createChunk(cx, cz);
                    visibleKeys.add(`${cx},${cz}`);
                }
            }

            for (const [key, mesh] of chunks.entries()) {
                if (!visibleKeys.has(key)) {
                    scene.remove(mesh);
                    mesh.geometry.dispose();
                    chunks.delete(key);
                }
            }
        }

        // --- 7. Locomotion Logic ---
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());

        const inputMap = { KeyW: false, KeyA: false, KeyS: false, KeyD: false };
        window.addEventListener('keydown', (e) => { if (e.code in inputMap) inputMap[e.code] = true; });
        window.addEventListener('keyup', (e) => { if (e.code in inputMap) inputMap[e.code] = false; });

        const movementDirection = new THREE.Vector3();
        const executionClock = new THREE.Clock();

        function processMovement(delta) {
            if (!controls.isLocked) return;

            const velocityScalar = 32;
            movementDirection.set(0, 0, 0);

            if (inputMap.KeyW) movementDirection.z -= velocityScalar * delta;
            if (inputMap.KeyS) movementDirection.z += velocityScalar * delta;
