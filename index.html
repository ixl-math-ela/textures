<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8K Terrain Loader</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.8s ease;
        }

        #loader-bar-container {
            width: 300px;
            height: 4px;
            background: #222;
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        #loader-bar {
            width: 0%;
            height: 100%;
            background: #4ade80;
            transition: width 0.3s;
        }

        #loading-text { color: #888; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #333;
            backdrop-filter: blur(10px);
            display: none;
        }

        .coords { font-family: monospace; color: #4ade80; font-size: 14px; margin-top: 4px; }
        .controls { font-size: 11px; margin-top: 10px; color: #999; line-height: 1.5; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="loader-bar-container"><div id="loader-bar"></div></div>
        <div id="loading-text">Preloading 8K Assets...</div>
    </div>

    <div id="ui">
        <strong>8K Infinite Grassland</strong>
        <div id="coords" class="coords">X: 0, Y: 0, Z: 0</div>
        <div class="controls">
            WASD: Fly | Q/E: Vertical<br>
            Mouse: Look | Click: Engage
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const BASE_URL = 'https://github.com/ixl-math-ela/textures/releases/download/v1.0.0.0/';
        const ASSETS = {
            sky: 'DaySkyHDRI063B_1K_TONEMAPPED.jpg',
            color: BASE_URL + 'Grass.jpg',
            ao: BASE_URL + 'GrassA.jpg',
            displacement: BASE_URL + 'GrassD.jpg',
            normal: BASE_URL + 'GrassNGL.jpg',
            roughness: BASE_URL + 'GrassR.jpg'
        };

        const CHUNK_SIZE = 150;
        const SEGMENTS = 180; 
        const RENDER_DISTANCE = 2; 
        const TILING = 1.0; 

        let scene, camera, renderer, clock, manager;
        let chunks = new Map();
        let keys = { w: false, a: false, s: false, d: false, q: false, e: false };
        let textures = {};
        let isLoaded = false;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 50, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.3;
            document.body.appendChild(renderer.domElement);

            manager = new THREE.LoadingManager();
            const loader = new THREE.TextureLoader(manager);
            loader.setCrossOrigin('anonymous');

            manager.onProgress = (url, itemsLoaded, itemsTotal) => {
                const progress = (itemsLoaded / itemsTotal) * 100;
                document.getElementById('loader-bar').style.width = progress + '%';
            };

            manager.onLoad = () => {
                isLoaded = true;
                document.getElementById('loading-screen').style.opacity = '0';
                document.getElementById('ui').style.display = 'block';
                setTimeout(() => { document.getElementById('loading-screen').remove(); }, 800);
            };

            loader.load(ASSETS.sky, (tex) => {
                tex.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = tex;
                scene.environment = tex;
            });

            const maps = ['color', 'normal', 'roughness', 'ao', 'displacement'];
            maps.forEach(m => {
                loader.load(ASSETS[m], (t) => {
                    t.wrapS = t.wrapT = THREE.RepeatWrapping;
                    t.repeat.set(TILING, TILING);
                    t.anisotropy = renderer.capabilities.getMaxAnisotropy();
                    textures[m] = t;
                });
            });

            scene.add(new THREE.AmbientLight(0xffffff, 0.05));
            const sun = new THREE.DirectionalLight(0xffffff, 0.6);
            sun.position.set(200, 400, 200);
            scene.add(sun);

            clock = new THREE.Clock();
            setupControls();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function getBaseHeight(x, z) {
            return (Math.sin(x * 0.005) * Math.cos(z * 0.005) * 30) + (Math.sin(x * 0.015) * 8);
        }

        function createChunk(x, z) {
            const geometry = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, SEGMENTS, SEGMENTS);
            geometry.rotateX(-Math.PI / 2);

            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let px = pos.getX(i) + x * CHUNK_SIZE;
                let pz = pos.getZ(i) + z * CHUNK_SIZE;
                pos.setY(i, getBaseHeight(px, pz));
            }
            
            geometry.setAttribute('uv2', new THREE.BufferAttribute(geometry.attributes.uv.array, 2));
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({
                map: textures.color,
                normalMap: textures.normal,
                roughnessMap: textures.roughness,
                aoMap: textures.ao,
                displacementMap: textures.displacement,
                displacementScale: 18.0, 
                displacementBias: -8.0,
                normalScale: new THREE.Vector2(6.0, 6.0),
                aoMapIntensity: 3.0,
                roughness: 1.0
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x * CHUNK_SIZE, 0, z * CHUNK_SIZE);
            return mesh;
        }

        function updateChunks() {
            if (!isLoaded) return;

            const curX = Math.round(camera.position.x / CHUNK_SIZE);
            const curZ = Math.round(camera.position.z / CHUNK_SIZE);

            document.getElementById('coords').innerText = 
                `X: ${Math.floor(camera.position.x)} | Y: ${Math.floor(camera.position.y)} | Z: ${Math.floor(camera.position.z)}`;

            const visible = new Set();
            for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
                for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
                    const cx = curX + x;
                    const cz = curZ + z;
                    const key = `${cx},${cz}`;
                    visible.add(key);

                    if (!chunks.has(key)) {
                        const chunk = createChunk(cx, cz);
                        scene.add(chunk);
                        chunks.set(key, chunk);
                    }
                }
            }

            chunks.forEach((chunk, key) => {
                if (!visible.has(key)) {
                    scene.remove(chunk);
                    chunk.geometry.dispose();
                    chunk.material.dispose();
                    chunks.delete(key);
                }
            });
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
            document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

            let pitch = 0, yaw = 0;
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
                    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
                }
            });

            document.addEventListener('click', () => document.body.requestPointerLock());
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isLoaded) return;

            const delta = clock.getDelta();
            const flySpeed = 120.0;

            const moveDir = new THREE.Vector3();
            if (keys.w) moveDir.z -= 1;
            if (keys.s) moveDir.z += 1;
            if (keys.a) moveDir.x -= 1;
            if (keys.d) moveDir.x += 1;
            
            moveDir.normalize();

            camera.translateZ(moveDir.z * flySpeed * delta);
            camera.translateX(moveDir.x * flySpeed * delta);

            if (keys.q) camera.position.y += flySpeed * delta;
            if (keys.e) camera.position.y -= flySpeed * delta;

            updateChunks();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
