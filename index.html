<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8K Infinite World</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020202; font-family: sans-serif; }
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.8s ease;
        }
        #bar-bg { width: 280px; height: 2px; background: #111; margin-bottom: 10px; }
        #bar-fill { width: 0%; height: 100%; background: #4ade80; transition: width 0.2s; }
        #load-msg { color: #555; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            background: rgba(0,0,0,0.7); padding: 12px; border-radius: 4px;
            pointer-events: none; display: none; font-family: monospace;
            border-left: 3px solid #4ade80;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div id="bar-bg"><div id="bar-fill"></div></div>
        <div id="load-msg">Loading 8K Grassland... 0%</div>
    </div>

    <div id="ui">
        <div id="pos">X: 0 Y: 0 Z: 0</div>
        <div style="font-size: 9px; color: #888; margin-top: 5px;">WASD: MOVE | Q/E: UP/DOWN</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const CONFIG = {
            baseUrl: 'https://github.com/ixl-math-ela/textures/releases/download/v1.0.0.0/',
            sky: 'DaySkyHDRI063B_1K_TONEMAPPED.jpg',
            textures: {
                color: 'Grass.jpg',
                ao: 'GrassA.jpg',
                disp: 'GrassD.jpg',
                norm: 'GrassNGL.jpg',
                rough: 'GrassR.jpg'
            },
            chunkSize: 180,
            res: 140,
            view: 2,
            tiling: 0.15 
        };

        let scene, camera, renderer, clock, manager;
        let chunks = new Map();
        let active = false;
        let keys = {};
        let maps = {};

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(0, 100, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.45;
            document.body.appendChild(renderer.domElement);

            manager = new THREE.LoadingManager();
            const loader = new THREE.TextureLoader(manager);
            loader.setCrossOrigin('anonymous');

            manager.onProgress = (url, loaded, total) => {
                const p = Math.floor((loaded / total) * 100);
                document.getElementById('bar-fill').style.width = p + '%';
                document.getElementById('load-msg').innerText = `Syncing High-Res Buffer: ${p}%`;
            };

            manager.onLoad = () => {
                document.getElementById('loader').style.opacity = '0';
                document.getElementById('ui').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('loader').remove();
                    active = true;
                }, 800);
            };

            loader.load(CONFIG.sky, (t) => {
                t.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = t;
                scene.environment = t;
            });

            Object.keys(CONFIG.textures).forEach(key => {
                loader.load(CONFIG.baseUrl + CONFIG.textures[key], (t) => {
                    t.wrapS = t.wrapT = THREE.RepeatWrapping;
                    t.repeat.set(CONFIG.tiling, CONFIG.tiling);
                    t.anisotropy = renderer.capabilities.getMaxAnisotropy();
                    maps[key] = t;
                }, undefined, () => {
                    console.warn("Texture Failed (CORS)");
                });
            });

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(500, 1000, 500);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0xffffff, 0.1));

            clock = new THREE.Clock();
            window.addEventListener('resize', onResize);
            window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
            window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
            
            let pitch = 0, yaw = 0;
            document.addEventListener('mousemove', e => {
                if (document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
                }
            });
            document.addEventListener('mousedown', () => { if(active) document.body.requestPointerLock(); });

            animate();
        }

        function getH(x, z) {
            return (Math.sin(x * 0.004) * Math.cos(z * 0.004) * 60) + (Math.sin(x * 0.01) * 10);
        }

        function createChunk(x, z) {
            const geo = new THREE.PlaneGeometry(CONFIG.chunkSize, CONFIG.chunkSize, CONFIG.res, CONFIG.res);
            geo.rotateX(-Math.PI / 2);
            const p = geo.attributes.position;
            for (let i = 0; i < p.count; i++) {
                let px = p.getX(i) + x * CONFIG.chunkSize;
                let pz = p.getZ(i) + z * CONFIG.chunkSize;
                p.setY(i, getH(px, pz));
            }
            geo.setAttribute('uv2', new THREE.BufferAttribute(geo.attributes.uv.array, 2));
            geo.computeVertexNormals();

            const mat = new THREE.MeshStandardMaterial({
                color: maps.color ? 0xffffff : 0x223311,
                map: maps.color || null,
                normalMap: maps.norm || null,
                roughnessMap: maps.rough || null,
                aoMap: maps.ao || null,
                displacementMap: maps.disp || null,
                displacementScale: 45, 
                displacementBias: -15,
                normalScale: new THREE.Vector2(8, 8),
                roughness: 0.9,
                metalness: 0.0
            });

            const m = new THREE.Mesh(geo, mat);
            m.position.set(x * CONFIG.chunkSize, 0, z * CONFIG.chunkSize);
            return m;
        }

        function update() {
            const cx = Math.round(camera.position.x / CONFIG.chunkSize);
            const cz = Math.round(camera.position.z / CONFIG.chunkSize);
            document.getElementById('pos').innerText = `X: ${Math.floor(camera.position.x)} Y: ${Math.floor(camera.position.y)} Z: ${Math.floor(camera.position.z)}`;

            const current = new Set();
            for (let i = -CONFIG.view; i <= CONFIG.view; i++) {
                for (let j = -CONFIG.view; j <= CONFIG.view; j++) {
                    const k = `${cx + i},${cz + j}`;
                    current.add(k);
                    if (!chunks.has(k)) {
                        const c = createChunk(cx + i, cz + j);
                        scene.add(c);
                        chunks.set(k, c);
                    }
                }
            }
            chunks.forEach((c, k) => {
                if (!current.has(k)) {
                    scene.remove(c);
                    c.geometry.dispose();
                    c.material.dispose();
                    chunks.delete(k);
                }
            });
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!active) return;
            const dt = clock.getDelta();
            const s = 220;
            const d = new THREE.Vector3();
            if (keys.w) d.z -= 1; if (keys.s) d.z += 1;
            if (keys.a) d.x -= 1; if (keys.d) d.x += 1;
            d.normalize();
            camera.translateZ(d.z * s * dt);
            camera.translateX(d.x * s * dt);
            if (keys.q) camera.position.y += s * dt;
            if (keys.e) camera.position.y -= s * dt;
            update();
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
