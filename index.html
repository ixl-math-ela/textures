<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Terrain</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #444;
        }
        .coords { font-family: monospace; color: #4ade80; margin-top: 5px; }
        .controls { font-size: 11px; margin-top: 10px; color: #aaa; line-height: 1.4; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <strong>Infinite Terrain</strong>
        <div id="coords" class="coords">X: 0, Y: 0, Z: 0</div>
        <div class="controls">
            WASD: Fly | Q/E: Up/Down<br>
            Mouse: Look | Click: Lock
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const ASSETS = {
            sky: 'DaySkyHDRI063B_1K_TONEMAPPED.jpg',
            color: 'Grass005_1K-PNG_Color.png',
            normal: 'Grass005_1K-PNG_NormalGL.png',
            roughness: 'Grass005_1K-PNG_Roughness.png',
            ao: 'Grass005_1K-PNG_AmbientOcclusion.png',
            displacement: 'Grass005_1K-PNG_Displacement.png'
        };

        const CHUNK_SIZE = 100;
        const SEGMENTS = 160; 
        const RENDER_DISTANCE = 2; 
        const TILING = 12;

        let scene, camera, renderer, clock, loader;
        let chunks = new Map();
        let keys = { w: false, a: false, s: false, d: false, q: false, e: false };
        let textures = {};

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
            camera.position.set(0, 20, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.45;
            
            document.body.appendChild(renderer.domElement);

            loader = new THREE.TextureLoader();

            loader.load(ASSETS.sky, (tex) => {
                tex.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = tex;
                scene.environment = tex;
            });

            const maps = ['color', 'normal', 'roughness', 'ao', 'displacement'];
            maps.forEach(m => {
                const t = loader.load(ASSETS[m]);
                t.wrapS = t.wrapT = THREE.RepeatWrapping;
                t.repeat.set(TILING, TILING);
                t.anisotropy = renderer.capabilities.getMaxAnisotropy();
                textures[m] = t;
            });

            const ambient = new THREE.AmbientLight(0xffffff, 0.15);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            clock = new THREE.Clock();

            setupControls();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function getBaseHeight(x, z) {
            return (Math.sin(x * 0.01) * Math.cos(z * 0.01) * 15) + (Math.sin(x * 0.03) * 4);
        }

        function createChunk(x, z) {
            const geometry = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, SEGMENTS, SEGMENTS);
            geometry.rotateX(-Math.PI / 2);

            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let px = pos.getX(i) + x * CHUNK_SIZE;
                let pz = pos.getZ(i) + z * CHUNK_SIZE;
                pos.setY(i, getBaseHeight(px, pz));
            }
            
            geometry.setAttribute('uv2', new THREE.BufferAttribute(geometry.attributes.uv.array, 2));
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({
                map: textures.color,
                normalMap: textures.normal,
                roughnessMap: textures.roughness,
                aoMap: textures.ao,
                displacementMap: textures.displacement,
                displacementScale: 9.0, 
                displacementBias: -3.5,
                normalScale: new THREE.Vector2(4.0, 4.0),
                aoMapIntensity: 2.0,
                roughness: 1.0,
                metalness: 0.0
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x * CHUNK_SIZE, 0, z * CHUNK_SIZE);
            return mesh;
        }

        function updateChunks() {
            const curX = Math.round(camera.position.x / CHUNK_SIZE);
            const curZ = Math.round(camera.position.z / CHUNK_SIZE);

            document.getElementById('coords').innerText = 
                `X: ${Math.floor(camera.position.x)} | Y: ${Math.floor(camera.position.y)} | Z: ${Math.floor(camera.position.z)}`;

            const visible = new Set();
            for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
                for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
                    const cx = curX + x;
                    const cz = curZ + z;
                    const key = `${cx},${cz}`;
                    visible.add(key);

                    if (!chunks.has(key)) {
                        const chunk = createChunk(cx, cz);
                        scene.add(chunk);
                        chunks.set(key, chunk);
                    }
                }
            }

            chunks.forEach((chunk, key) => {
                if (!visible.has(key)) {
                    scene.remove(chunk);
                    chunk.geometry.dispose();
                    chunk.material.dispose();
                    chunks.delete(key);
                }
            });
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
            document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

            let pitch = 0, yaw = 0;
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
                    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
                }
            });

            document.addEventListener('click', () => document.body.requestPointerLock());
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const flySpeed = 80.0;

            const moveDir = new THREE.Vector3();
            if (keys.w) moveDir.z -= 1;
            if (keys.s) moveDir.z += 1;
            if (keys.a) moveDir.x -= 1;
            if (keys.d) moveDir.x += 1;
            
            moveDir.normalize();

            camera.translateZ(moveDir.z * flySpeed * delta);
            camera.translateX(moveDir.x * flySpeed * delta);

            if (keys.q) camera.position.y += flySpeed * delta;
            if (keys.e) camera.position.y -= flySpeed * delta;

            updateChunks();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
