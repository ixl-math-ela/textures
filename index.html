<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Grass Terrain</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .coords { font-family: monospace; color: #4ade80; margin-top: 5px; }
        .controls { font-size: 11px; margin-top: 10px; color: #999; line-height: 1.4; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <strong>Infinite Terrain: Grass005</strong>
        <div id="coords" class="coords">X: 0, Z: 0</div>
        <div class="controls">
            WASD: Move | Click: Lock Mouse<br>
            Using: Color, Normal, Roughness, AO, Height
        </div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // File Hierarchy Config (Everything in the same folder)
        const TEXTURES = {
            map: 'Grass005_1K-PNG_Color.png',
            normalMap: 'Grass005_1K-PNG_NormalGL.png',
            roughnessMap: 'Grass005_1K-PNG_Roughness.png',
            aoMap: 'Grass005_1K-PNG_AmbientOcclusion.png',
            displacementMap: 'Grass005_1K-PNG_Displacement.png'
        };

        const CHUNK_SIZE = 50;
        const SEGMENTS = 64; // Higher segments for better displacement mapping
        const RENDER_DISTANCE = 2; // Chunks around the player
        const TILING = 4; // How many times the texture repeats per chunk

        let scene, camera, renderer, clock, textureLoader;
        let chunks = new Map();
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let loadedTextures = {};

        // Simple Sine-wave based noise for height variation
        function getHeight(x, z) {
            return (Math.sin(x * 0.05) * Math.cos(z * 0.05) * 3) + 
                   (Math.sin(x * 0.1 + z * 0.1) * 1.5);
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111); // Dark start
            scene.fog = new THREE.Fog(0x111111, 20, CHUNK_SIZE * RENDER_DISTANCE);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.physicallyCorrectLights = true; // Use physically based lighting
            document.body.appendChild(renderer.domElement);

            // Textures need second UV set for AO mapping in some Three.js versions
            textureLoader = new THREE.TextureLoader();
            loadAllTextures();

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            clock = new THREE.Clock();

            setupControls();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function loadAllTextures() {
            Object.keys(TEXTURES).forEach(key => {
                const tex = textureLoader.load(TEXTURES[key]);
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                tex.repeat.set(TILING, TILING);
                loadedTextures[key] = tex;
            });
        }

        function createChunk(x, z) {
            const geometry = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, SEGMENTS, SEGMENTS);
            geometry.rotateX(-Math.PI / 2);

            // Procedural height based on coordinates
            const positions = geometry.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                let px = positions.getX(i) + x * CHUNK_SIZE;
                let pz = positions.getZ(i) + z * CHUNK_SIZE;
                positions.setY(i, getHeight(px, pz));
            }
            geometry.computeVertexNormals();

            // PBR Material using your Grass005 files
            const material = new THREE.MeshStandardMaterial({
                map: loadedTextures.map,
                normalMap: loadedTextures.normalMap,
                roughnessMap: loadedTextures.roughnessMap,
                aoMap: loadedTextures.aoMap,
                displacementMap: loadedTextures.displacementMap,
                displacementScale: 0.5, // Subtle height depth
                roughness: 1.0,
                metalness: 0.0
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x * CHUNK_SIZE, 0, z * CHUNK_SIZE);
            
            return mesh;
        }

        function updateChunks() {
            const curX = Math.round(camera.position.x / CHUNK_SIZE);
            const curZ = Math.round(camera.position.z / CHUNK_SIZE);

            document.getElementById('coords').innerText = `X: ${Math.floor(camera.position.x)}, Z: ${Math.floor(camera.position.z)}`;

            const visibleKeys = new Set();

            for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
                for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
                    const cx = curX + x;
                    const cz = curZ + z;
                    const key = `${cx},${cz}`;
                    visibleKeys.add(key);

                    if (!chunks.has(key)) {
                        const chunk = createChunk(cx, cz);
                        scene.add(chunk);
                        chunks.set(key, chunk);
                    }
                }
            }

            // Remove chunks that are far away
            for (const [key, chunk] of chunks) {
                if (!visibleKeys.has(key)) {
                    scene.remove(chunk);
                    chunk.geometry.dispose();
                    chunk.material.dispose();
                    chunks.delete(key);
                }
            }
        }

        function setupControls() {
            const handleKey = (val) => (e) => {
                switch(e.code) {
                    case 'KeyW': moveForward = val; break;
                    case 'KeyS': moveBackward = val; break;
                    case 'KeyA': moveLeft = val; break;
                    case 'KeyD': moveRight = val; break;
                }
            };
            document.addEventListener('keydown', handleKey(true));
            document.addEventListener('keyup', handleKey(false));

            let pitch = 0, yaw = 0;
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
                }
            });

            document.addEventListener('click', () => document.body.requestPointerLock());
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Movement physics
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

            camera.translateX(-velocity.x * delta);
            camera.translateZ(velocity.z * delta);
            
            // Stay above terrain
            const h = getHeight(camera.position.x, camera.position.z);
            camera.position.y = THREE.MathUtils.lerp(camera.position.y, h + 2.5, 0.1);

            updateChunks();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
