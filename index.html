<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Task Dashboard</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 32px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .input-group {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            gap: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        button.add-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button.add-btn:hover {
            background-color: var(--primary-hover);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            transition: transform 0.1s;
        }

        .task-item:active {
            transform: scale(0.99);
        }

        .task-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .task-text {
            font-weight: 500;
        }

        .task-text.completed {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .delete-btn {
            background: transparent;
            color: #ef4444;
            border: 1px solid #fee2e2;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Message Box instead of Alert */
        #msg-box {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 99px;
            font-size: 0.875rem;
            display: none;
            z-index: 1000;
            box-shadow: var(--shadow);
        }

        @media (max-width: 600px) {
            .input-group {
                flex-direction: column;
            }
            button.add-btn {
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Focus Flow</h1>
            <p style="color: var(--text-muted)">Manage your daily rhythm.</p>
        </header>

        <div class="input-group">
            <input type="text" id="task-input" placeholder="What needs to be done?">
            <button class="add-btn" onclick="addTask()">Add Task</button>
        </div>

        <ul class="task-list" id="task-list">
            <!-- Tasks appear here -->
        </ul>
    </div>

    <div id="msg-box"></div>

    <script>
        const taskInput = document.getElementById('task-input');
        const taskList = document.getElementById('task-list');
        const msgBox = document.getElementById('msg-box');

        function showMessage(text) {
            msgBox.textContent = text;
            msgBox.style.display = 'block';
            setTimeout(() => {
                msgBox.style.display = 'none';
            }, 2500);
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (!text) {
                showMessage("Please enter a task first!");
                return;
            }

            const li = document.createElement('li');
            li.className = 'task-item';
            li.innerHTML = `
                <div class="task-info">
                    <input type="checkbox" class="checkbox" onchange="toggleTask(this)">
                    <span class="task-text">${text}</span>
                </div>
                <button class="delete-btn" onclick="this.parentElement.remove()">Delete</button>
            `;

            taskList.appendChild(li);
            taskInput.value = '';
            taskInput.focus();
        }

        function toggleTask(checkbox) {
            const span = checkbox.nextElementSibling;
            if (checkbox.checked) {
                span.classList.add('completed');
            } else {
                span.classList.remove('completed');
            }
        }

        // Allow 'Enter' key to add task
        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });

        window.onload = () => {
            console.log("Dashboard loaded and ready.");
        };
    </script>
</body>
</html>
