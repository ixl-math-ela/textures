<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Flight: Grass005 & HDRI</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            pointer-events: none;
            border: 1px solid #444;
            backdrop-filter: blur(5px);
        }
        .coords { font-family: monospace; color: #4ade80; margin-top: 5px; font-size: 14px; }
        .controls { font-size: 11px; margin-top: 10px; color: #bbb; line-height: 1.5; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui">
        <strong>Infinite Terrain Flight</strong>
        <div id="coords" class="coords">X: 0, Y: 0, Z: 0</div>
        <div class="controls">
            WASD: Fly Directionally<br>
            Q / E: Ascend / Descend<br>
            Mouse: Look Around | Click: Lock
        </div>
    </div>

    <!-- Three.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // Assets Configuration (Same folder hierarchy)
        const ASSETS = {
            sky: 'DaySkyHDRI063B_1K_TONEMAPPED.jpg',
            color: 'Grass005_1K-PNG_Color.png',
            normal: 'Grass005_1K-PNG_NormalGL.png',
            roughness: 'Grass005_1K-PNG_Roughness.png',
            ao: 'Grass005_1K-PNG_AmbientOcclusion.png',
            height: 'Grass005_1K-PNG_Displacement.png'
        };

        const CHUNK_SIZE = 60;
        const SEGMENTS = 100; // High resolution for displacement mapping
        const RENDER_DISTANCE = 3; 
        const TILING = 6; // Repeat grass pattern

        let scene, camera, renderer, clock, loader;
        let chunks = new Map();
        let keys = { w: false, a: false, s: false, d: false, q: false, e: false };
        let velocity = new THREE.Vector3();
        let textures = {};

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 10, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            loader = new THREE.TextureLoader();

            // Load Sky HDRI
            loader.load(ASSETS.sky, (tex) => {
                tex.mapping = THREE.EquirectangularReflectionMapping;
                scene.background = tex;
                scene.environment = tex;
            });

            loadGrassTextures();

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(100, 200, 100);
            scene.add(sun);

            clock = new THREE.Clock();

            setupControls();
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function loadGrassTextures() {
            const texKeys = ['color', 'normal', 'roughness', 'ao', 'height'];
            texKeys.forEach(key => {
                const t = loader.load(ASSETS[key]);
                t.wrapS = t.wrapT = THREE.RepeatWrapping;
                t.repeat.set(TILING, TILING);
                textures[key] = t;
            });
        }

        // Noise function for large scale terrain shape
        function getBaseHeight(x, z) {
            return (Math.sin(x * 0.02) * Math.cos(z * 0.02) * 10) + 
                   (Math.sin(x * 0.05) * 2);
        }

        function createChunk(x, z) {
            const geometry = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, SEGMENTS, SEGMENTS);
            geometry.rotateX(-Math.PI / 2);

            // Set height for geometry and add uv2 for AO map
            const pos = geometry.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                let px = pos.getX(i) + x * CHUNK_SIZE;
                let pz = pos.getZ(i) + z * CHUNK_SIZE;
                pos.setY(i, getBaseHeight(px, pz));
            }
            
            // AO Map requirement: second set of UVs
            geometry.setAttribute('uv2', new THREE.BufferAttribute(geometry.attributes.uv.array, 2));
            
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({
                map: textures.color,
                normalMap: textures.normal,
                roughnessMap: textures.roughness,
                aoMap: textures.ao,
                displacementMap: textures.height,
                displacementScale: 1.5, // Adds physical depth to grass
                displacementBias: -0.5,
                aoMapIntensity: 1.0,
                normalScale: new THREE.Vector2(1.5, 1.5)
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x * CHUNK_SIZE, 0, z * CHUNK_SIZE);
            return mesh;
        }

        function updateChunks() {
            const curX = Math.round(camera.position.x / CHUNK_SIZE);
            const curZ = Math.round(camera.position.z / CHUNK_SIZE);

            document.getElementById('coords').innerText = 
                `X: ${Math.floor(camera.position.x)}, Y: ${Math.floor(camera.position.y)}, Z: ${Math.floor(camera.position.z)}`;

            const visible = new Set();
            for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
                for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
                    const cx = curX + x;
                    const cz = curZ + z;
                    const key = `${cx},${cz}`;
                    visible.add(key);

                    if (!chunks.has(key)) {
                        const chunk = createChunk(cx, cz);
                        scene.add(chunk);
                        chunks.set(key, chunk);
                    }
                }
            }

            chunks.forEach((chunk, key) => {
                if (!visible.has(key)) {
                    scene.remove(chunk);
                    chunk.geometry.dispose();
                    chunk.material.dispose();
                    chunks.delete(key);
                }
            });
        }

        function setupControls() {
            document.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
            document.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

            let pitch = 0, yaw = 0;
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    yaw -= e.movementX * 0.002;
                    pitch -= e.movementY * 0.002;
                    pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
                    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
                }
            });

            document.addEventListener('click', () => document.body.requestPointerLock());
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const speed = 50.0;

            // Free Flying Movement
            const moveDir = new THREE.Vector3();
            if (keys.w) moveDir.z -= 1;
            if (keys.s) moveDir.z += 1;
            if (keys.a) moveDir.x -= 1;
            if (keys.d) moveDir.x += 1;
            
            moveDir.normalize();

            // Move relative to camera orientation
            camera.translateZ(moveDir.z * speed * delta);
            camera.translateX(moveDir.x * speed * delta);

            // Vertical movement (Ascend/Descend)
            if (keys.q) camera.position.y += speed * delta;
            if (keys.e) camera.position.y -= speed * delta;

            updateChunks();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
